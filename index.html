<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eid Surprise Pro</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to top, #020111, #191621);
      color: white;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      animation: moveStars 50s linear infinite;
    }

    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 1000px 1000px;}
    }

    .moon {
      position: absolute;
      top: 50px;
      right: 80px;
      width: 80px;
      height: 80px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 30px #fff;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .card {
      position: relative;
      background: rgba(255,255,255,0.1);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
      z-index: 2;
    }

    #message {
      font-size: 24px;
      min-height: 60px;
      transition: 0.5s;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      cursor: pointer;
      display: none;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { background: red; }
      50% { background: yellow; color: black; }
      100% { background: red; }
    }

    .firework {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
      to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
      }
    }

    .glow {
      font-size: 28px;
      color: gold;
      text-shadow: 0 0 10px gold, 0 0 20px orange;
      animation: glow 1s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px gold; }
      to { text-shadow: 0 0 20px orange, 0 0 30px gold; }
    }
  </style>
</head>
<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="card">
  <div id="message">Let's Start</div>
  <button id="btn" onclick="showFinal()">⚠ Click to Continue</button>
</div>

<!-- Alarm Sound -->
<audio id="alarmSound">
  <source src="https://www.soundjay.com/button/beep-07.wav">
</audio>

<!-- Final Celebration Sound -->
<audio id="celebrationSound">
  <source src="https://www.soundjay.com/human/cheering-01.mp3">
</audio>

<script>
const messages = [
  "Let's Start",
  "I hope you are fine 😊",
  "I have a surprise for you 🎁"
];

const finalMessage = "🌙✨ Advance Eid Mubarak My Friend 🎉";

let index = 0;
const msg = document.getElementById("message");
const btn = document.getElementById("btn");
const alarm = document.getElementById("alarmSound");
const celebration = document.getElementById("celebrationSound");

function showNextMessage() {
  msg.style.opacity = 0;

  setTimeout(() => {
    index++;

    if (index < messages.length) {
      msg.innerText = messages[index];
      msg.style.opacity = 1;
    } else {
      clearInterval(interval);

      msg.innerText = "⚠ Click to Continue";
      msg.style.opacity = 1;
      btn.style.display = "inline-block";

      alarm.loop = true;
      alarm.play();
    }
  }, 500);
}

function showFinal() {
  msg.classList.add("glow");
  msg.innerText = finalMessage;
  btn.style.display = "none";

  // Stop alarm
  alarm.pause();
  alarm.currentTime = 0;

  // Play celebration sound 🎉
  celebration.play();

  startFireworks();
}

function startFireworks() {
  setInterval(() => {
    for (let i = 0; i < 20; i++) {
      const fw = document.createElement("div");
      fw.className = "firework";

      const x = (Math.random() - 0.5) * 300 + "px";
      const y = (Math.random() - 0.5) * 300 + "px";

      fw.style.setProperty('--x', x);
      fw.style.setProperty('--y', y);

      fw.style.left = "50%";
      fw.style.top = "50%";

      document.body.appendChild(fw);

      setTimeout(() => fw.remove(), 1000);
    }
  }, 800);
}

const interval = setInterval(showNextMessage, 2000);
</script>

</body>
</html>
